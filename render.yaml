services:
  - type: web
    name: logistics-ai-backend
    env: docker
    plan: starter
    rootDir: backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SQLITE_FILE_PATH
        value: /data/logistics.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
