services:
  - type: web
    name: logistics-ai-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: SQLITE_FILE_PATH
        value: /data/logistics.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
