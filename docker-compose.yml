services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-ai-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the local backend directory to /app in the container for hot-reloading
      - ./backend:/app
      # Mount a local data directory to /data for SQLite persistence
      - ./backend/data:/data
    env_file:
      # Load environment variables (like OPENAI_API_KEY) from the backend .env file
      - ./backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      # Override SQLITE_FILE_PATH to point to the mounted volume
      - SQLITE_FILE_PATH=/data/logistics.db
